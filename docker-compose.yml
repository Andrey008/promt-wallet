name: prompt-wallet

services:
  app:
    build: ./docker/php
    volumes:
      - .:/var/www/html
    depends_on:
      - db
    environment:
      - APP_ENV=dev
      - DATABASE_URL=postgresql://app:secret@db:5432/prompt_wallet?serverVersion=16&charset=utf8
    networks:
      - prompt-wallet-net

  nginx:
    image: nginx:alpine
    ports:
      - "19080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - prompt-wallet-net

  mailpit:
    image: axllent/mailpit
    ports:
      - "19025:1025"
      - "19825:8025"
    networks:
      - prompt-wallet-net

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: prompt_wallet
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "prompt_wallet", "-U", "app"]
      timeout: 5s
      retries: 5
      start_period: 60s
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "19432:5432"
    networks:
      - prompt-wallet-net

volumes:
  db_data:

networks:
  prompt-wallet-net:
    driver: bridge
